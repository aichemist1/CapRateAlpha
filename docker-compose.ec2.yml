services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: capratealpha-app
    env_file:
      - .env.production
    restart: unless-stopped
    ports:
      - "3000:3000"

  caddy:
    image: caddy:2.8-alpine
    container_name: capratealpha-caddy
    depends_on:
      - app
    env_file:
      - .env.production
    profiles:
      - public
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:

